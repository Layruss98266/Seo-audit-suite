name: Deploy (Vercel)

# Ships the app to Vercel via the Vercel CLI, driven by GitHub Actions rather
# than Vercel's own Git integration — so deploys are gated on the CI workflow
# passing (see ci.yml) and all deploy logs live in one place.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN       — a Vercel access token (vercel.com/account/tokens)
#   VERCEL_ORG_ID      — from `.vercel/project.json` after `vercel link`
#   VERCEL_PROJECT_ID  — from `.vercel/project.json` after `vercel link`
#
# Pull requests get a Preview deployment; pushes to main get a Production one.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # Reuse the existing build+test gate so a broken commit never deploys.
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Sets enabled=true only when the token secret is present. Every deploy
      # step below gates on this output, so a repo without secrets configured
      # gets a green (skipped) run instead of a hard failure on `vercel pull`.
      - name: Guard — require VERCEL_TOKEN
        id: guard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN is not set — skipping deploy. Add repo secrets VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID to enable deployments."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull Vercel environment (production)
        if: ${{ steps.guard.outputs.enabled == 'true' && github.event_name == 'push' }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Pull Vercel environment (preview)
        if: ${{ steps.guard.outputs.enabled == 'true' && github.event_name == 'pull_request' }}
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (production)
        if: ${{ steps.guard.outputs.enabled == 'true' && github.event_name == 'push' }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (preview)
        if: ${{ steps.guard.outputs.enabled == 'true' && github.event_name == 'pull_request' }}
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy (production)
        if: ${{ steps.guard.outputs.enabled == 'true' && github.event_name == 'push' }}
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy (preview)
        if: ${{ steps.guard.outputs.enabled == 'true' && github.event_name == 'pull_request' }}
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
